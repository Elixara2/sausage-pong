<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body {
    height:100%; width:100%; overflow:hidden; background:#0b0f1a;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    touch-action:none; overscroll-behavior:none; overflow:hidden;
    user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;
  }
  #game { display:block; position:absolute; inset:0; touch-action:none; }
  #fx { position:absolute; inset:0; z-index:20; pointer-events:none; }
  #hud {
    position:absolute; top:calc(env(safe-area-inset-top,0px) + 10px);
    left:env(safe-area-inset-left,0px); right:env(safe-area-inset-right,0px);
    display:flex; justify-content:space-between; padding:0 clamp(14px,4vw,28px);
    color:#fff; font-weight:800; font-size:clamp(13px,3.4vw,18px); letter-spacing:1px;
    text-shadow:0 2px 8px rgba(0,0,0,.6); pointer-events:none; z-index:5;
  }
  .pill { background:rgba(0,0,0,.28); padding:6px 14px; border-radius:20px;
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    font-variant-numeric:tabular-nums; }
  #overlay {
    position:absolute; inset:0; z-index:10; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; color:#fff;
    background:radial-gradient(circle at 50% 30%, rgba(30,40,70,.85), rgba(11,15,26,.96));
    backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
    padding:clamp(20px,6vw,44px); gap:0;
  }
  #overlay.hidden { display:none; }
  #overlay h1 { font-size:clamp(28px,8vw,52px); font-weight:900; letter-spacing:1px;
    margin-bottom:6px; text-wrap:balance;
    background:linear-gradient(90deg,#ffb347,#ff5e62); -webkit-background-clip:text; background-clip:text; color:transparent; }
  #overlay .sub { font-size:clamp(14px,3.8vw,19px); opacity:.85; margin-bottom:clamp(18px,4vh,30px);
    line-height:1.5; max-width:34ch; text-wrap:balance; }
  #overlay .score { font-size:clamp(20px,5.5vw,28px); margin-bottom:4px; font-weight:800; }
  #overlay .best  { font-size:clamp(15px,4vw,20px); opacity:.85; margin-bottom:clamp(16px,4vh,26px); }
  #overlay .best b { color:#ffb347; }
  .resetlink { font-family:inherit; background:none; border:none; box-shadow:none;
    color:rgba(255,255,255,.55); font-size:0.78em; font-weight:600; text-decoration:underline;
    padding:2px 6px; margin-left:6px; cursor:pointer; touch-action:manipulation; }
  .resetlink.armed { color:#ff8a8a; }
  button {
    font-family:inherit; font-weight:800; font-size:clamp(16px,4.6vw,22px); letter-spacing:1px; color:#0b0f1a;
    background:linear-gradient(90deg,#ffb347,#ff7e5f); border:none;
    padding:clamp(13px,2.4vh,18px) clamp(36px,10vw,60px);
    border-radius:40px; box-shadow:0 8px 24px rgba(255,120,80,.4); cursor:pointer;
    touch-action:manipulation;
  }
  button:active { transform:scale(.96); }
  button:focus-visible { outline:3px solid #fff; outline-offset:3px; }
  button.ghost { background:transparent; color:#fff; border:2px solid rgba(255,255,255,.5);
    box-shadow:none; margin-top:14px; padding:11px 30px; font-size:clamp(14px,4vw,18px); }
  .emoji { font-size:clamp(40px,12vw,64px); margin-bottom:14px; }
  .dntoggle { display:flex; gap:4px; padding:4px; margin:2px 0 18px;
    background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.22); border-radius:30px; }
  .dnOpt { font-family:inherit; font-weight:800; font-size:clamp(13px,3.6vw,16px); color:#fff;
    background:transparent; border:none; border-radius:24px; padding:9px 18px; cursor:pointer;
    opacity:.65; box-shadow:none; touch-action:manipulation; }
  .dnOpt.active { opacity:1; background:linear-gradient(90deg,#ffb347,#ff7e5f); color:#0b0f1a; }
  #menuBtn {
    position:absolute; z-index:6;
    top:calc(env(safe-area-inset-top,0px) + 8px); left:calc(env(safe-area-inset-left,0px) + 10px);
    width:42px; height:42px; padding:0; border-radius:12px;
    display:none; align-items:center; justify-content:center;
    font-size:22px; line-height:1; font-weight:700; color:#fff; letter-spacing:0;
    background:rgba(0,0,0,.32); border:1px solid rgba(255,255,255,.25);
    box-shadow:0 2px 10px rgba(0,0,0,.35); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  }
  #hud { padding-left:calc(env(safe-area-inset-left,0px) + 62px); }
  #mpYouPill {
    position:absolute; z-index:5; left:50%; transform:translateX(-50%);
    bottom:calc(env(safe-area-inset-bottom,0px) + 10px);
    color:#fff; font-weight:800; font-size:clamp(13px,3.4vw,18px); letter-spacing:1px;
    text-shadow:0 2px 8px rgba(0,0,0,.6); pointer-events:none;
    font-variant-numeric:tabular-nums;
  }
  .mp-code { font-size:clamp(30px,10vw,46px); font-weight:900; letter-spacing:6px;
    color:#ffb347; margin:6px 0 14px; font-variant-numeric:tabular-nums; }
  .mp-link { font-size:0.85em; opacity:.7; word-break:break-all; max-width:32ch;
    margin-bottom:18px; padding:8px 12px; background:rgba(255,255,255,.08); border-radius:10px; }

  .mp-dot { width:9px; height:9px; border-radius:50%; background:#ffb347;
    animation:mpPulse 1.1s ease-in-out infinite; }
  .mp-dot.ok { background:#3ddc73; animation:none; }
  @keyframes mpPulse { 0%,100%{opacity:.3; transform:scale(.8);} 50%{opacity:1; transform:scale(1.15);} }
  .mp-row { display:flex; gap:8px; align-items:center; justify-content:center; margin-top:6px; }
  .mp-input { font-family:inherit; font-weight:800; letter-spacing:3px; text-transform:uppercase;
    font-size:clamp(15px,4.4vw,20px); width:7.5em; text-align:center; padding:12px 10px;
    border-radius:16px; border:2px solid rgba(255,255,255,.35); background:rgba(255,255,255,.08);
    color:#fff; }
  .mp-input::placeholder { color:rgba(255,255,255,.4); letter-spacing:2px; }

  @media (prefers-reduced-motion: reduce){ button:active{ transform:none; } }
</style>
</head>
<body>
<canvas id="game"></canvas>
<button id="menuBtn" class="ui-control" aria-label="Menu">☰</button>
<div id="hud">
  <div class="pill"><span id="scoreLabel">SCORE</span> <span id="scoreEl">0</span></div>
  <div class="pill"><span id="bestLabel">BEST</span> <span id="bestEl">0</span></div>
</div>
<div id="mpYouPill" class="pill" style="display:none">YOU <span id="mpYouScore">0</span></div>
<div id="overlay">
  <div class="emoji">🌭</div>
  <h1>SAUSAGE PONG</h1>
  <div class="sub">Keep the heads off the floor. Every bounce scores. Grab power-ups: 🔥 multi-head · 🌭 big sausage · 🛡️ shield. Beat your best.</div>
  <div class="best" id="menuBest">Best: <b>0</b></div>
  <button id="startBtn">TAP TO PLAY</button>
</div>
<canvas id="fx"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const fx = document.getElementById('fx');
const fxCtx = fx.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const scoreEl = document.getElementById('scoreEl');
const bestEl  = document.getElementById('bestEl');
const menuBest = document.getElementById('menuBest');
const menuBtn = document.getElementById('menuBtn');
const scoreLabel = document.getElementById('scoreLabel');
const bestLabel = document.getElementById('bestLabel');
const mpYouPill = document.getElementById('mpYouPill');
const mpYouScore = document.getElementById('mpYouScore');

// core game state — declared up top so resize()/reflow() at startup never hit a
// temporal-dead-zone error (that would kill the whole script before tap handlers attach)
let state='menu', score=0, player=null, clock=0;
let balls=[];
let powerups=[], bits=[], rings=[], pops=[];
let shake=0, growT=0, nextPU=0;
let flyBirds=[], poos=[], splats=[], nextBird=0;
let shields=0;

// ================= 2-player online multiplayer (additive; solo untouched) =================
// states used: 'mp-choose' | 'mp-hosting' | 'mp-joining' | 'mp-play'
const mpUrlRoom = (new URLSearchParams(location.search).get('room') || '').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6) || null;
let mpMode = 'off';                 // 'off' | 'host' | 'guest'
let mpPeer = null, mpConn = null, mpRoomCode = '', mpErr = '';
let mpBalls = [];
let mpPTop = null, mpPBottom = null;         // canonical: host owns bottom, guest owns top
let mpScoreTop = 0, mpScoreBottom = 0;
let mpShieldsTop = 0, mpShieldsBottom = 0;
let mpGrowTop = 0, mpGrowBottom = 0;
let mpHeat = 0, mpNextPU = 0, mpWaitingServe = false;
let mpLastSend = 0;
let mpSnapshot = null, mpSnapClock = 0;      // guest: latest state from host + when it arrived
let mpMyTx = 0;                              // local player's own paddle target x (both roles)
function mpMyRole(){ return mpMode==='host' ? 'bottom' : 'top'; }
function mpIsHost(){ return mpMode==='host'; }

let W=0, H=0, DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2.5);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W*DPR; canvas.height = H*DPR;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  fx.width = W*DPR; fx.height = H*DPR;
  fx.style.width = W+'px'; fx.style.height = H+'px';
  fxCtx.setTransform(DPR,0,0,DPR,0,0);
  if(typeof reflow === 'function') reflow();
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', ()=> setTimeout(resize, 250));
if(window.visualViewport) window.visualViewport.addEventListener('resize', resize);
resize();

// ---- High score (persisted) ----
let best = 0;
try { best = parseInt(localStorage.getItem('sausagePongBest')||'0', 10) || 0; } catch(e){}
function saveBest(){ try { localStorage.setItem('sausagePongBest', String(best)); } catch(e){} }
bestEl.textContent = best;
menuBest.innerHTML = 'Best: <b>'+best+'</b>';

// ---- Head size setting (persisted) ---- default is BIG (2x)
const headScale = 2;   // fixed at 200% — no longer user-adjustable

// ---- Day / Night scene toggle (persisted) ----
let dayMode = false;
try { dayMode = localStorage.getItem('sausagePongDayMode') === '1'; } catch(e){}
function saveDayMode(){ try { localStorage.setItem('sausagePongDayMode', dayMode ? '1' : '0'); } catch(e){} }

// ---- Images ----
// three heads, chosen at random; index 0 is the original (neutral) head
const HEAD_SRCS = ['head.png','head2.png','head3.png'];
const HEADS = HEAD_SRCS.map(src => {
  const im = new Image(); im._ok = false;
  im.onload = ()=> im._ok = true; im.onerror = ()=> im._ok = false;
  im.src = src; return im;
});
function headOf(b){ return HEADS[b && b.hi ? b.hi : 0] || HEADS[0]; }
function headReady(im){ return im && im._ok; }
// back-compat alias
const headImg = HEADS[0];
// where each head's eyes & mouth sit (fractions of its drawn box) for the surprise overlay
const HEAD_FEATURES = [
  { eyes:[[0.36,0.45],[0.60,0.45]], eyeR:0.100, mouth:[0.48,0.69], mouthW:0.150 },
  { eyes:[[0.31,0.46],[0.63,0.47]], eyeR:0.110, mouth:[0.44,0.75], mouthW:0.160 },
  { eyes:[[0.34,0.45],[0.55,0.45]], eyeR:0.085, mouth:[0.47,0.72], mouthW:0.120 },
];

const sausageImg = new Image();
let sausageLoaded = false;
sausageImg.onload = ()=> sausageLoaded = true;
sausageImg.onerror = ()=> sausageLoaded = false;
sausageImg.src = 'sausage.png';

const sausageHotImg = new Image();       // glowing red-hot sausage (cross-faded in as it heats)
let sausageHotLoaded = false;
sausageHotImg.onload = ()=> sausageHotLoaded = true;
sausageHotImg.src = 'sausage_hot.png';

let heat = 0;                            // 0..1 how fast/hot the action is
const SAUSAGE_ASPECT = 460/1000;   // sprite h/w
const BODY_FRAC = 271/460;         // sausage thickness / sprite height
const BODY_CY   = 0.5;             // body centred vertically in the sprite

// ---- Sound (synthesized, no files) ----
let AC = null;
let sizzleGain = null;                    // continuous frying sizzle, loudness follows heat
function initAudio(){
  if(AC) { if(AC.state==='suspended') AC.resume(); }
  else { try { AC = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){ AC=null; } }
  if(AC && !sizzleGain){
    try {
      const buf = AC.createBuffer(1, AC.sampleRate*2, AC.sampleRate);
      const d = buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i] = Math.random()*2-1;   // white noise
      const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
      const bp = AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2600; bp.Q.value=0.7;
      const hp = AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=1200;
      sizzleGain = AC.createGain(); sizzleGain.gain.value = 0;
      src.connect(hp); hp.connect(bp); bp.connect(sizzleGain); sizzleGain.connect(AC.destination);
      src.start();
    } catch(e){ sizzleGain = null; }
  }
}
function setSizzle(level){                 // level 0..1
  if(!AC || !sizzleGain) return;
  const g = Math.max(0, Math.min(0.006, level*0.006));    // much quieter sizzle
  // long time-constant => the sizzle always fades in/out gradually, never pops
  try { sizzleGain.gain.setTargetAtTime(g, AC.currentTime, 0.30); } catch(e){}
}

// bright rising chime for a shield save
function playClutch(){
  if(!AC) return; const t=AC.currentTime;
  [660, 880, 1175].forEach((f,i)=>{
    const tt=t+i*0.05, o=AC.createOscillator(), g=AC.createGain();
    o.type='triangle'; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,tt); g.gain.exponentialRampToValueAtTime(0.24,tt+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,tt+0.22);
    o.connect(g); g.connect(AC.destination); o.start(tt); o.stop(tt+0.26);
  });
}
// squishy "boing" when the head hits the sausage
function playSquish(){
  if(!AC) return;
  const t = AC.currentTime;
  const o = AC.createOscillator();
  const g = AC.createGain();
  const vib = AC.createOscillator();     // wobble for the "squish"
  const vg = AC.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(560, t);
  o.frequency.exponentialRampToValueAtTime(120, t+0.16);
  vib.type='sine'; vib.frequency.setValueAtTime(28, t);
  vg.gain.setValueAtTime(60, t);
  vib.connect(vg); vg.connect(o.frequency);   // frequency wobble => squishy
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.5, t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t+0.22);
  o.connect(g); g.connect(AC.destination);
  o.start(t); vib.start(t);
  o.stop(t+0.24); vib.stop(t+0.24);
}
// cute, satisfying bubble/marimba "bloop" when the head hits a wall.
// each hit is a random note from a pentatonic scale, so repeats always sound
// musical & pleasant (never fatiguing), soft sine tone with a little bounce.
const PENTA = [0, 2, 4, 7, 9, 12];              // major pentatonic (semitones)
function playOw(){
  if(!AC) return;
  const t = AC.currentTime;
  const base = 174.6;                            // ~F3, warm low-ish register
  const f = base * Math.pow(2, PENTA[(Math.random()*PENTA.length)|0] / 12);
  const lp = AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=2200;
  lp.connect(AC.destination);
  // main body: soft sine that bloops up a little
  const o = AC.createOscillator(); const g = AC.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(f*0.62, t);
  o.frequency.exponentialRampToValueAtTime(f, t+0.05);       // gentle bloop up
  o.frequency.exponentialRampToValueAtTime(f*0.92, t+0.15);  // tiny settle
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.24, t+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t+0.20);
  o.connect(g); g.connect(lp);
  // soft octave sparkle for a marimba-like ping
  const o2 = AC.createOscillator(); const g2 = AC.createGain();
  o2.type='sine'; o2.frequency.setValueAtTime(f*2, t);
  g2.gain.setValueAtTime(0.0001, t);
  g2.gain.exponentialRampToValueAtTime(0.07, t+0.006);
  g2.gain.exponentialRampToValueAtTime(0.0001, t+0.11);
  o2.connect(g2); g2.connect(lp);
  o.start(t); o.stop(t+0.22); o2.start(t); o2.stop(t+0.13);
}
let lastOw = 0;
function owThrottled(){
  const n = performance.now();
  if(n - lastOw > 120){ lastOw = n; playOw(); }
}
// happy sparkle / cheer for beating the high score
function playCheer(){
  if(!AC) return;
  const t0 = AC.currentTime;
  const notes = [523, 659, 784, 1047, 1319];   // C E G C E — major arpeggio
  notes.forEach((f, i)=>{
    const t = t0 + i*0.09;
    const o = AC.createOscillator(); const g = AC.createGain();
    o.type='triangle'; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.3, t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t+0.5);
    o.connect(g); g.connect(AC.destination);
    o.start(t); o.stop(t+0.55);
  });
}
// a single firework "pop"
function playPop(){
  if(!AC) return;
  const t = AC.currentTime;
  const n = AC.createBufferSource();
  const buf = AC.createBuffer(1, AC.sampleRate*0.2, AC.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i] = (Math.random()*2-1)*Math.pow(1-i/data.length, 2);
  n.buffer = buf;
  const g = AC.createGain(); g.gain.value = 0.25;
  const f = AC.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1200; f.Q.value=0.8;
  n.connect(f); f.connect(g); g.connect(AC.destination);
  n.start(t);
}

// ---- Game state ---- (state/score/ball/player/clock declared at top of script)
const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0
             || (window.matchMedia && matchMedia('(pointer:coarse)').matches);
const THIN = isTouch ? 0.66 : 1.0;                         // slimmer sausage on mobile = harder
function clampN(v,a,b){ return v<a?a:v>b?b:v; }
// sizes scale to the screen so it feels right on phone, tablet and laptop, any orientation
function paddleW(){ return clampN(W*0.1575, 57, 172); }     // sausage length / hit width (50% bigger)
function paddleH(){ return paddleW()*0.30*THIN; }          // sausage thickness (thin, as before)
function ballR(){ return clampN(Math.min(W,H)*0.075*headScale, 16, 260); }
function bottomMargin(){ return clampN(H*0.11, 54, 150); } // gap from bottom to sausage

// a head only counts as "hot" (sausage glow/sizzle + surprised face) once it's
// moving quite fast; each head is judged on its OWN speed.
const HOT_FROM = 1.7;                                      // higher => starts later (needs an even faster head)
function speedHeat(sp){
  const sn = sp / Math.min(W,H);
  return clampN((sn - HOT_FROM)/0.7, 0, 1);
}

// ---- oil drip particles ----
let drips = [];
function spawnDrips(n, x, y, spread){
  for(let i=0;i<n;i++){
    drips.push({
      x: x + (Math.random()*2-1)*spread,
      y: y + Math.random()*6,
      vx: (Math.random()*2-1)*W*0.03,
      vy: Math.random()*H*0.05,
      r: Math.max(2.2, W*0.008)*(0.7+Math.random()*0.7),
      life: 0, max: 1.1 + Math.random()*0.7
    });
  }
  if(drips.length > 120) drips.splice(0, drips.length-120);
}
function updateDrips(dt){
  for(const d of drips){
    d.life += dt;
    d.vy += H*0.9*dt;         // gravity
    d.x += d.vx*dt;
    d.y += d.vy*dt;
  }
  drips = drips.filter(d => d.life < d.max && d.y < H + 40);
}
// ---- fireworks celebration ----
let sparks = [];
let celebrateUntil = 0;
let nextBurst = 0;
const FW_COLORS = ['#ff5e62','#ffd166','#88aaff','#7CFC9E','#66d9ff','#c78bff','#ff8fcf'];
function burst(x, y){
  const hue = FW_COLORS[(Math.random()*FW_COLORS.length)|0];
  const n = 34 + (Math.random()*24|0);
  for(let i=0;i<n;i++){
    const a = (i/n)*Math.PI*2 + Math.random()*0.2;
    const sp = (0.6+Math.random()*0.9) * Math.min(W,H)*0.5;
    sparks.push({ x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:0,
      max:0.9+Math.random()*0.7, col:hue, r:2+Math.random()*2 });
  }
  playPop();
}
function startCelebration(){
  celebrateUntil = clock + 3.4;
  nextBurst = clock;
  playCheer();
}
function updateFireworks(dt){
  if(clock < celebrateUntil && clock >= nextBurst){
    burst(W*(0.2+Math.random()*0.6), H*(0.18+Math.random()*0.32));
    nextBurst = clock + 0.28 + Math.random()*0.25;
  }
  for(const s of sparks){
    s.life += dt;
    s.vy += H*0.35*dt;          // gravity
    s.vx *= (1 - dt*0.9);        // air drag
    s.vy *= (1 - dt*0.9);
    s.x += s.vx*dt; s.y += s.vy*dt;
  }
  sparks = sparks.filter(s => s.life < s.max);
}
function drawFireworks(){
  fxCtx.clearRect(0,0,W,H);
  fxCtx.globalCompositeOperation = 'lighter';
  for(const s of sparks){
    const a = Math.max(0, 1 - s.life/s.max);
    fxCtx.globalAlpha = a;
    fxCtx.fillStyle = s.col;
    fxCtx.beginPath(); fxCtx.arc(s.x, s.y, s.r*(0.6+a*0.8), 0, Math.PI*2); fxCtx.fill();
    fxCtx.globalAlpha = a*0.4;
    fxCtx.beginPath(); fxCtx.arc(s.x - s.vx*0.01, s.y - s.vy*0.01, s.r*0.7, 0, Math.PI*2); fxCtx.fill();
  }
  for(const b of bits){                       // impact sparks (hits/misses)
    const a = Math.max(0, 1 - b.life/b.max);
    fxCtx.globalAlpha = a;
    fxCtx.fillStyle = b.col;
    fxCtx.beginPath(); fxCtx.arc(b.x, b.y, b.r*(0.5+a), 0, Math.PI*2); fxCtx.fill();
  }
  fxCtx.globalAlpha = 1;
  fxCtx.globalCompositeOperation = 'source-over';
}

// bright sparkle when you grab a power-up
function playPowerup(){
  if(!AC) return;
  const t=AC.currentTime;
  [660,990,1320].forEach((f,i)=>{
    const tt=t+i*0.06, o=AC.createOscillator(), g=AC.createGain();
    o.type='triangle'; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,tt);
    g.gain.exponentialRampToValueAtTime(0.26,tt+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,tt+0.25);
    o.connect(g); g.connect(AC.destination); o.start(tt); o.stop(tt+0.3);
  });
}
function vibrate(p){ try{ if(navigator.vibrate) navigator.vibrate(p); }catch(e){} }

function drawDrips(){
  for(const d of drips){
    const a = Math.max(0, 1 - d.life/d.max);
    ctx.save();
    ctx.globalAlpha = 0.85*a;
    // teardrop: round bead + tapered tail
    ctx.fillStyle = '#a5702e';
    ctx.beginPath();
    ctx.moveTo(d.x, d.y - d.r*1.8);
    ctx.quadraticCurveTo(d.x + d.r, d.y, d.x, d.y + d.r);
    ctx.quadraticCurveTo(d.x - d.r, d.y, d.x, d.y - d.r*1.8);
    ctx.fill();
    ctx.globalAlpha = 0.9*a;
    ctx.fillStyle = 'rgba(255,240,210,.9)';
    ctx.beginPath(); ctx.arc(d.x - d.r*0.3, d.y - d.r*0.2, d.r*0.28, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function playerY(){ return H - bottomMargin() - paddleH()/2; }
function makeBall(x,y,vx,vy,hi){ return { x, y, r:ballR(), vx, vy, hw:ballR(), hh:ballR(), trail:[], hi:hi||0, phase:Math.random()*6.28 }; }
function spawnHeadBall(x,y,hi){
  const ang = -Math.PI/2 + (Math.random()*2-1)*0.9, sp = Math.min(W,H)*1.24; // 2x speed -> harder
  return makeBall(x, y, Math.cos(ang)*sp, Math.sin(ang)*sp, hi);
}
function resetGame(){
  score = 0;
  scoreEl.textContent = 0;
  const hi = Math.floor(Math.random()*3);   // random starting head
  balls = [ makeBall(W/2, H*0.35, (Math.random()*2-1)*Math.min(W,H)*0.5, Math.min(W,H)*0.9, hi) ];
  player = { x: W/2, y: playerY(), w: paddleW(), h: paddleH(), tx: W/2, wobStart: -10 };
  drips = []; powerups = []; bits = []; rings = []; pops = [];
  shake = 0; growT = 0; heat = 0; shields = 0;
  nextPU = clock + 5 + Math.random()*4;
}

// keep everything valid when the screen resizes or rotates
function reflow(){
  if(player){
    player.w = paddleW()*(growT>0?1.9:1); player.h = paddleH()*(growT>0?1.35:1); player.y = playerY();
    player.x  = clampN(player.x,  player.w/2, W - player.w/2);
    player.tx = clampN(player.tx, player.w/2, W - player.w/2);
    for(const b of balls){ b.r = ballR(); b.x = clampN(b.x, b.r, W-b.r); b.y = clampN(b.y, b.r, H-b.r); }
  }
  if(mpPBottom && mpPTop){
    mpPBottom.y = mpPaddleBottomY(); mpPTop.y = mpPaddleTopY();
    mpPBottom.x = clampN(mpPBottom.x, mpPBottom.w/2, W-mpPBottom.w/2);
    mpPTop.x = clampN(mpPTop.x, mpPTop.w/2, W-mpPTop.w/2);
    mpMyTx = clampN(mpMyTx, paddleW()/2, W-paddleW()/2);
    for(const b of mpBalls){ b.x=clampN(b.x,b.r,W-b.r); b.y=clampN(b.y,b.r,H-b.r); }
  }
}

function startGame(){
  initAudio();
  resetGame();
  state='play';
  overlay.classList.add('hidden');
  if(menuBtn) menuBtn.style.display='flex';
}

function menuHTML(){
  return `
    <div class="emoji">🌭</div>
    <h1>SAUSAGE PONG</h1>
    <div class="sub">Keep the heads off the floor. Every bounce scores. Grab power-ups: 🔥 multi-head · 🌭 big sausage · 🛡️ shield. Beat your best.</div>
    <div class="best">Best: <b>${best}</b> <button id="resetBestBtn" class="ui-control resetlink">reset</button></div>
    <div class="dntoggle ui-control" id="dnToggle">
      <button class="dnOpt ui-control ${!dayMode?'active':''}" data-mode="night">🌙 Night</button>
      <button class="dnOpt ui-control ${dayMode?'active':''}" data-mode="day">☀️ Day</button>
    </div>
    <button id="startBtn">TAP TO PLAY</button>
    <button id="mpOpenBtn" class="ui-control ghost">🏓 Play with a friend</button>`;
}
function renderMenu(){
  overlay.innerHTML = menuHTML();
  overlay.classList.remove('hidden');
  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('mpOpenBtn').addEventListener('click', (e)=>{ e.stopPropagation(); mpErr=''; renderMpChoose(); });
  document.getElementById('dnToggle').querySelectorAll('.dnOpt').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      dayMode = btn.dataset.mode === 'day';
      saveDayMode();
      renderMenu();
    });
  });
  let resetArmed = false, resetTimer = null;
  const resetBtn = document.getElementById('resetBestBtn');
  resetBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    if(!resetArmed){
      resetArmed = true;

      clearTimeout(resetTimer);
      resetTimer = setTimeout(()=>{ resetArmed=false; resetBtn.textContent='reset'; resetBtn.classList.remove('armed'); }, 3000);
    } else {
      clearTimeout(resetTimer);
      best = 0; saveBest(); bestEl.textContent = best;
      renderMenu();
    }
  });
}
function showMenu(){ renderMenu(); }

// ---- Start on a tap/click ANYWHERE (robust across Android WebViews where a top
// canvas can otherwise swallow the button tap). Listens on window so it fires no
// matter which layer receives the event. Interactive controls (.ui-control) — like
// the day/night toggle — are excluded so they can be tapped without starting a game. ----
function tryStart(e){
  if(e && e.target && e.target.closest && e.target.closest('.ui-control')) return;
  // only the plain solo menu auto-starts on any tap; mp sub-screens require their own buttons
  if(state==='menu' && !overlay.classList.contains('hidden')) startGame();
}
window.addEventListener('click', tryStart);
window.addEventListener('touchend', tryStart, {passive:true});
window.addEventListener('keydown', (e)=>{ if(e.key===' '||e.key==='Enter') tryStart(); });
if(mpUrlRoom) renderMpJoinPrompt(); else renderMenu();   // build the menu and wire handlers

// ---- top-corner Menu button: pause and open the menu ----
function goToMenu(){

  if(mpMode!=='off') mpTeardown();

}
if(menuBtn){

// ---- Control: thumb on mobile, cursor-follow on desktop (also window-level) ----
function pointerX(e){ const t = e.touches ? e.touches[0] : e; return t.clientX; }
function setPaddle(e){
  if(state==='play' && player){ player.tx = pointerX(e); }
  else if(state==='mp-play'){ mpSetLocalTarget(pointerX(e)); }
}
function onTouch(e){ if(state==='play' || state==='mp-play'){ setPaddle(e); e.preventDefault(); } }  // drag paddle
window.addEventListener('touchstart', onTouch, {passive:false});
window.addEventListener('touchmove',  onTouch, {passive:false});

function clamp(v,a,b){ return v<a?a:v>b?b:v; }

function gameOver(){
  state='over';
  shake = 18;
  heat = 0; setSizzle(0);
  if(menuBtn) menuBtn.style.display='none';
  const isNew = score > best && score > 0;
  if(isNew){ best = score; saveBest(); bestEl.textContent = best; startCelebration(); }
  setTimeout(()=>{
    overlay.innerHTML = `
      <div class="emoji">${isNew?'🏆':'💀'}</div>
      <h1>${isNew?'NEW BEST!':'GAME OVER'}</h1>
      <div class="score">Score ${score}</div>
      <div class="best">Best <b>${best}</b></div>
      <button id="againBtn">PLAY AGAIN</button>`;
    overlay.classList.remove('hidden');
    document.getElementById('againBtn').addEventListener('click', startGame);
  }, 350);
}

// ---- juice helpers ----
function spawnBits(x,y,n,col){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=Math.min(W,H)*(0.12+Math.random()*0.45);
    bits.push({ x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp - Math.min(W,H)*0.12,
      life:0, max:0.45+Math.random()*0.45, col, r:2+Math.random()*2.6 });
  }
  if(bits.length>240) bits.splice(0, bits.length-240);
}
function ring(x,y,col){ rings.push({ x, y, r:Math.min(W,H)*0.02, life:0, max:0.55, col }); }
function pop(x,y,txt,col){ pops.push({ x, y, txt, col, life:0, max:0.95 }); }
function addShake(v){ shake = Math.max(shake, v); }

function wallHit(b){ owThrottled(); addShake(4); spawnBits(b.x, b.y, 4, '#ffffff'); vibrate(8); }
function onPaddleHit(b){
  score += 1; scoreEl.textContent = score;   // simple: one point per bounce
  player.wobStart = clock;
  playSquish();
  spawnDrips(7, b.x, player.y + player.h*0.5, player.w*0.35);
  spawnBits(b.x, player.y, 12, '#8bedff');
  addShake(6);
  vibrate(12);
}
function loseBall(b){
  addShake(14);
  spawnBits(b.x, H-6, 16, '#ff6b6b');
  vibrate(110);
}

function update(dt){
  if(state!=='play') return;
  if(growT>0) growT=Math.max(0,growT-dt);

  // paddle (wider AND thicker while a Big Sausage power-up is active)
  player.w = paddleW()*(growT>0?1.9:1);
  player.h = paddleH()*(growT>0?1.35:1);
  player.x += (player.tx - player.x) * Math.min(1, dt*20);
  player.x = clamp(player.x, player.w/2, W - player.w/2);
  const p = player, top = p.y - p.h/2;

  for(let i=balls.length-1;i>=0;i--){
    const b = balls[i];
    b.x += b.vx*dt;
    b.y += b.vy*dt;
    const hh = b.r;
    const im = headOf(b);
    const hw = headReady(im) ? hh * (im.width/im.height) : hh;
    b.hw=hw; b.hh=hh;

    b.trail.push({x:b.x, y:b.y}); if(b.trail.length>9) b.trail.shift();

    if(b.x-hw<0){ b.x=hw; b.vx=Math.abs(b.vx); wallHit(b); }
    if(b.x+hw>W){ b.x=W-hw; b.vx=-Math.abs(b.vx); wallHit(b); }
    if(b.y-hh<0){ b.y=hh; b.vy=Math.abs(b.vy); wallHit(b); }

    const withinX = b.x > p.x-p.w/2-hw && b.x < p.x+p.w/2+hw;
    if(withinX && b.vy>0 && b.y+hh>top && b.y<p.y){
      b.vy = -Math.abs(b.vy);
      const rel = (b.x-p.x)/(p.w/2);
      b.vx += rel*W*0.5; b.vx = clamp(b.vx,-W*1.3,W*1.3);
      b.vy *= (score < 8 ? 1.15 : 1.08);       // ramps fast early, then eases off after 8
      b.y = top - hh;
      onPaddleHit(b);
    }

    if(b.y-hh>H){
      if(shields>0){                            // shield absorbs the miss, bounce it back
        shields--;
        b.y = H - hh; b.vy = -Math.abs(b.vy)*0.9;
        ring(b.x, H-hh, '120,235,255'); spawnBits(b.x, H-10, 14, '#7de3ff');
        pop(b.x, H*0.8, 'SAVED!', '#7de3ff'); playClutch(); vibrate([10,20,10]);
      } else {
        balls.splice(i,1); loseBall(b);
      }
    }
  }
  if(balls.length===0){ gameOver(); return; }

  updatePowerups(dt);
  updateEffects(dt);

  // HEAT (sausage glow + sizzle): driven by the FASTEST head on screen.
  let fastest = 0;
  for(const b of balls){ const sp=Math.hypot(b.vx,b.vy); if(sp>fastest) fastest=sp; }
  const target = speedHeat(fastest);
  heat += (target - heat) * Math.min(1, dt*2.0);       // smooth ramp up/down
  setSizzle(heat);

  if(Math.random() < dt*3.0){
    spawnDrips(1, player.x + (Math.random()*2-1)*player.w*0.42, player.y + player.h*0.5, 4);
  }
  updateDrips(dt);
}

// ---- power-ups ----
const PU_TYPES = [
  { k:'multi',   col:'#ff5e62', emoji:'🔥', label:'MULTI-HEAD!' },
  { k:'grow',    col:'#ffd166', emoji:'🌭', label:'BIG SAUSAGE!' },
  { k:'shield',  col:'#7de3ff', emoji:'🛡️', label:'SHIELD!' },
];
function updatePowerups(dt){
  if(clock > nextPU){
    nextPU = clock + 6 + Math.random()*5;
    const t = PU_TYPES[(Math.random()*PU_TYPES.length)|0];
    const r = clampN(Math.min(W,H)*0.045, 16, 40);
    powerups.push({ x:r+Math.random()*(W-2*r), y:-r, r, vy:Math.min(W,H)*0.28, t, spin:0 });
  }
  const p = player, top = p.y - p.h/2;
  for(let i=powerups.length-1;i>=0;i--){
    const pu = powerups[i];
    pu.y += pu.vy*dt; pu.spin += dt;
    if(pu.y+pu.r>top && pu.y-pu.r<p.y+p.h/2 && pu.x>p.x-p.w/2-pu.r && pu.x<p.x+p.w/2+pu.r){
      applyPowerup(pu.t, pu.x, pu.y); powerups.splice(i,1); continue;
    }
    if(pu.y-pu.r>H) powerups.splice(i,1);
  }
}
function applyPowerup(t, x, y){
  playPowerup(); vibrate([8,10,8]);
  pop(x, y, t.label, t.col); ring(x, y, '255,255,255'); spawnBits(x, y, 20, t.col);
  if(t.k==='multi'){
    const base = balls[(Math.random()*balls.length)|0];
    const bx = base?base.x:x, by = base?base.y:y;
    // spit out whichever heads aren't on screen so all 3 are always in play
    const present = new Set(balls.map(b=>b.hi));
    let spawned = 0;
    for(let hi=0; hi<3; hi++){
      if(!present.has(hi)){ balls.push(spawnHeadBall(bx, by, hi)); spawned++; }
    }
    if(spawned===0){                      // all 3 already out -> still reward with 2 more
      for(let k=0;k<2;k++) balls.push(spawnHeadBall(bx, by, (Math.random()*3)|0));
    }
  } else if(t.k==='grow'){ growT = 5; }
  else if(t.k==='shield'){ shields = Math.min(shields+1, 3); }
}

// ---- effects update ----
function updateEffects(dt){
  for(const b of bits){ b.life+=dt; b.vy+=H*0.9*dt; b.x+=b.vx*dt; b.y+=b.vy*dt; }
  bits = bits.filter(b => b.life<b.max);
  for(const r of rings) r.life+=dt;
  rings = rings.filter(r => r.life<r.max);
  for(const q of pops){ q.life+=dt; q.y -= H*0.05*dt; }
  pops = pops.filter(q => q.life<q.max);
  if(shake>0) shake = Math.max(0, shake - dt*42);
}

// ---- Rendering: synthwave / outrun world (moving neon grid) ----
const stars = Array.from({length:70}, ()=>({
  x: Math.random(), y: Math.random(), r: Math.random()<0.85?1:2,
  ph: Math.random()*6.28, sp: 1+Math.random()*3
}));
const ridge = Array.from({length:19}, (_,k)=> (Math.sin(k*1.7)*0.5 + Math.sin(k*0.7+1)*0.5)*0.5 + 0.5 );
const clouds = Array.from({length:5}, ()=>({
  x: Math.random(), y: 0.10+Math.random()*0.30, s: 0.6+Math.random()*0.8, spd: 0.006+Math.random()*0.008
}));

function drawBackground(){
  const t = clock;
  const hz = H*0.52;                              // horizon
  const P = dayMode ? SCENE.day : SCENE.night;

  // sky
  let g = ctx.createLinearGradient(0,0,0,hz);
  P.sky.forEach(([stop,col])=> g.addColorStop(stop,col));
  ctx.fillStyle=g; ctx.fillRect(0,0,W,hz);

  // stars (night only)
  if(!dayMode){
    for(const s of stars){
      const sy=s.y*hz*0.66, tw=0.4+0.6*Math.sin(t*s.sp+s.ph);
      ctx.globalAlpha=tw*0.9*(1-s.y*0.8); ctx.fillStyle='#fff';
      ctx.fillRect(s.x*W, sy, s.r, s.r);
    }
    ctx.globalAlpha=1;
  } else {
    // drifting fluffy clouds (day only)
    for(const c of clouds){
      const cx = ((c.x + t*c.spd) % 1.3 - 0.15) * W;
      const cy = c.y*hz*0.62, cw = W*0.095*c.s, ch = cw*0.40;
      ctx.fillStyle='rgba(255,255,255,.82)';
      for(let k=-2;k<=2;k++){
        ctx.beginPath();
        ctx.ellipse(cx + k*cw*0.42, cy + Math.abs(k)*ch*0.25, cw*(1-Math.abs(k)*0.15), ch, 0, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  // retro sun with scanline gaps
  const sunX=W*0.5, sunY=hz-Math.min(W,H)*0.015, sunR=Math.min(W,H)*0.19;
  let sg=ctx.createRadialGradient(sunX,sunY,sunR*0.4,sunX,sunY,sunR*2.1);
  sg.addColorStop(0,P.sunHalo); sg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,hz);
  ctx.save();
  ctx.beginPath(); ctx.arc(sunX,sunY,sunR,0,Math.PI*2); ctx.clip();
  let sd=ctx.createLinearGradient(0,sunY-sunR,0,sunY+sunR);
  P.sunDisc.forEach(([stop,col])=> sd.addColorStop(stop,col));
  ctx.fillStyle=sd; ctx.fillRect(sunX-sunR,sunY-sunR,sunR*2,sunR*2);
  ctx.globalCompositeOperation='destination-out';
  for(let i=0;i<8;i++){ const by=sunY - sunR*0.12 + i*sunR*0.17; ctx.fillRect(sunX-sunR, by, sunR*2, sunR*(0.03+i*0.012)); }
  ctx.restore();

  // mountain ridge (sun sets behind it) + rim light
  ctx.fillStyle=P.ridgeFill;
  ctx.beginPath(); ctx.moveTo(0,hz);
  for(let i=0;i<ridge.length;i++){ ctx.lineTo(i/(ridge.length-1)*W, hz - ridge[i]*Math.min(W,H)*0.10); }
  ctx.lineTo(W,hz); ctx.closePath(); ctx.fill();
  ctx.strokeStyle=P.ridgeRim; ctx.lineWidth=2; ctx.beginPath();
  for(let i=0;i<ridge.length;i++){ const x=i/(ridge.length-1)*W, y=hz-ridge[i]*Math.min(W,H)*0.10; if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y); }
  ctx.stroke();

  // grid floor (scrolling toward the viewer)
  g=ctx.createLinearGradient(0,hz,0,H);
  g.addColorStop(0,P.groundNear); g.addColorStop(1,P.groundFar);
  ctx.fillStyle=g; ctx.fillRect(0,hz,W,H-hz);
  const vpx=W/2;
  ctx.strokeStyle=P.vLines; ctx.lineWidth=1.5;
  for(let i=-8;i<=8;i++){ const xb=vpx+i*(W*0.16); ctx.beginPath(); ctx.moveTo(vpx,hz); ctx.lineTo(xb,H); ctx.stroke(); }
  const scroll=(t*0.28)%1;
  for(let i=0;i<16;i++){
    const f=(i+scroll)/16, yy=hz+Math.pow(f,2.3)*(H-hz), a=0.12+0.5*f;
    ctx.strokeStyle='rgba('+P.gridA+','+a+')'; ctx.lineWidth=1+f*1.6;
    ctx.beginPath(); ctx.moveTo(0,yy); ctx.lineTo(W,yy); ctx.stroke();
    ctx.strokeStyle='rgba('+P.gridB+','+(a*0.5)+')';
    ctx.beginPath(); ctx.moveTo(0,yy-1); ctx.lineTo(W,yy-1); ctx.stroke();
  }
  // bright horizon line
  ctx.strokeStyle=P.horizonLine; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(0,hz); ctx.lineTo(W,hz); ctx.stroke();

  // slight shimmering waves along the horizon (day only)
  if(dayMode){
    ctx.save();
    for(let i=0;i<3;i++){
      const yy = hz - 5 - i*7;
      ctx.strokeStyle='rgba(255,255,255,'+(0.38-i*0.09)+')'; ctx.lineWidth=2;
      ctx.beginPath();
      for(let px=0; px<=W; px+=14){
        const yv = yy + Math.sin(px/70 + t*1.1 + i*1.7)*3;
        if(px===0) ctx.moveTo(px,yv); else ctx.lineTo(px,yv);
      }
      ctx.stroke();
    }
    ctx.restore();
  }
}
const SCENE = {
  night: {
    sky: [[0.0,'#0a0420'],[0.45,'#241056'],[0.72,'#7d1e73'],[0.9,'#e0347a'],[1.0,'#ff8a3d']],
    sunHalo: 'rgba(255,120,175,.55)',
    sunDisc: [[0,'#fff36b'],[0.45,'#ff9e4d'],[0.7,'#ff5aa6'],[1,'#c02a9c']],
    ridgeFill: '#180a33', ridgeRim: 'rgba(255,90,175,.55)',
    groundNear: '#2a0b46', groundFar: '#080418',
    vLines: 'rgba(0,238,255,.4)', gridA: '188,0,255', gridB: '0,238,255',
    horizonLine: 'rgba(255,130,205,.85)',
  },
  day: {
    sky: [[0.0,'#4fb2e6'],[0.45,'#8ad4f2'],[0.72,'#ffe29a'],[0.9,'#ffb15e'],[1.0,'#ff8a5a']],
    sunHalo: 'rgba(255,240,190,.65)',
    sunDisc: [[0,'#fffde8'],[0.45,'#ffe27a'],[0.7,'#ffb15e'],[1,'#ff8a5a']],
    ridgeFill: '#3a4a75', ridgeRim: 'rgba(255,200,140,.65)',
    groundNear: '#ffd9a0', groundFar: '#fff3da',
    vLines: 'rgba(0,150,190,.35)', gridA: '255,120,40', gridB: '0,150,190',
    horizonLine: 'rgba(255,190,120,.9)',
  },
};

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawSausage(p, heatOverride){
  const x=p.x, y=p.y, w=p.w, h=p.h, r=h/2;
  const hHeat = heatOverride===undefined ? heat : heatOverride;

  // --- jiggle / flop: big, visible wobble after a hit (no pulse ring anymore, so
  // the jiggle itself has to sell the impact) ---
  const t = clock - (p.wobStart!=null ? p.wobStart : -10);
  let sx=1, sy=1, rot=0;
  if(t >= 0 && t < 0.85){
    const decay = Math.exp(-t*4.4);
    const osc   = Math.sin(t*32);
    sy = 1 - 0.70*decay*osc;          // squash & stretch vertically
    sx = 1 + 0.52*decay*osc;          // ...and the opposite horizontally
    rot = 0.20*decay*Math.sin(t*26);  // a big floppy tilt
  }

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.scale(sx, sy);

  if(sausageLoaded){
    // draw the sprite so the sausage body thickness matches the collision height h
    const drawW = w * 1.10;                    // include rounded end caps
    const drawH = h / BODY_FRAC;               // body thickness == h (thinner on mobile)
    // red-hot glow behind the sausage as it heats up — a soft halo shaped like the
    // sausage itself (shadowBlur bleeds outward smoothly, so no hard rectangular edge)
    if(hHeat>0.02){
      ctx.save();
      ctx.globalAlpha = 0.55*hHeat;
      ctx.shadowColor = 'rgba(255,60,0,0.95)';
      ctx.shadowBlur = drawH*(0.9 + 0.9*hHeat);
      ctx.fillStyle = 'rgba(255,60,0,0.9)';
      ctx.beginPath(); ctx.ellipse(0, 0, drawW*0.40, drawH*0.42, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.shadowColor='rgba(0,0,0,.4)'; ctx.shadowBlur=14; ctx.shadowOffsetY=5;
    ctx.drawImage(sausageImg, -drawW/2, -drawH*BODY_CY, drawW, drawH);
    // cross-fade to the glowing hot sprite (aligned exactly, so only the sausage tints)
    if(hHeat>0.02 && sausageHotLoaded){
      ctx.shadowColor='transparent';
      ctx.globalAlpha = hHeat;
      ctx.drawImage(sausageHotImg, -drawW/2, -drawH*BODY_CY, drawW, drawH);
      ctx.globalAlpha = 1;
    }
  } else {
    // fallback capsule
    ctx.shadowColor='rgba(0,0,0,.45)'; ctx.shadowBlur=12; ctx.shadowOffsetY=4;
    const g=ctx.createLinearGradient(0,-h/2,0,h/2);
    g.addColorStop(0,'#d98a55'); g.addColorStop(.5,'#b5652f'); g.addColorStop(1,'#8a4a20');
    ctx.fillStyle=g;
    roundRect(-w/2, -h/2, w, h, r); ctx.fill();
  }
  ctx.restore();
}

function drawBall(b, flip){
  const {x,y}=b;
  const r = b.hh || b.r;
  const im = headOf(b);
  if(headReady(im)){
    const h = 2*r;                                 // height = ball diameter
    const w = h * (im.width/im.height);            // natural shape of this head
    ctx.save();
    // 2-player only: mirror the head vertically so its chin/face always points
    // toward whichever paddle it's currently heading for (flip = ball moving
    // toward the far/top side from this viewer's perspective)
    if(flip){ ctx.translate(x,y); ctx.scale(1,-1); ctx.translate(-x,-y); }
    // motion trail (fading ghosts)
    for(let i=0;i<b.trail.length;i++){
      const tp=b.trail[i], a=(i/b.trail.length)*0.26;
      ctx.globalAlpha=a; ctx.drawImage(im, tp.x-w/2, tp.y-h/2, w, h);
    }
    ctx.globalAlpha=1;
    // warm glow halo
    const g=ctx.createRadialGradient(x,y,r*0.2,x,y,r*1.55);
    g.addColorStop(0,'rgba(255,214,150,.30)'); g.addColorStop(1,'rgba(255,214,150,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r*1.55,0,Math.PI*2); ctx.fill();
    // the head
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,.45)'; ctx.shadowBlur=16; ctx.shadowOffsetY=6;
    ctx.drawImage(im, x-w/2, y-h/2, w, h);
    ctx.restore();
    // every head pulls a wide-eyed, open-mouth surprised face once IT flies fast
    // (drawn inside the same flip transform, so it stays aligned with the face —
    // ellipses/circles are symmetric under a vertical flip, so no extra math needed)
    const bh = speedHeat(Math.hypot(b.vx, b.vy));
    if(bh > 0.04) drawSurprised(HEAD_FEATURES[b.hi] || HEAD_FEATURES[0], x, y, w, h, bh);
    ctx.restore();
  } else {
    ctx.fillStyle='#e8b98f'; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
}
// overlay wide cartoon eyes + open "O" mouth aligned to this head's features
function drawSurprised(F, x, y, w, h, k){     // k = 0..1 speed intensity
  const fx = f => x - w/2 + f*w;
  const fy = f => y - h/2 + f*h;
  const boost = 1 + heat*0.15;                // just a touch bigger at the red-hot end
  const eyeR = w*F.eyeR*(0.7+0.38*k)*boost;   // top end (k=1) trimmed a bit smaller
  for(const [ex,ey] of F.eyes){
    const cx=fx(ex), cy=fy(ey);
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(cx,cy,eyeR,eyeR*1.15,0,0,Math.PI*2); ctx.fill();
    ctx.lineWidth=Math.max(1,w*0.012); ctx.strokeStyle='rgba(80,50,40,.6)'; ctx.stroke();
    ctx.fillStyle='#1a1108';                 // pupil
    ctx.beginPath(); ctx.arc(cx,cy+eyeR*0.15,eyeR*0.42,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.9)';    // glint
    ctx.beginPath(); ctx.arc(cx-eyeR*0.2,cy-eyeR*0.15,eyeR*0.14,0,Math.PI*2); ctx.fill();
  }
  // open mouth "O"
  const mx=fx(F.mouth[0]), my=fy(F.mouth[1]);
  const mw=w*F.mouthW*boost, mh=(h*0.045+h*0.075*k)*boost;
  ctx.fillStyle='#3a1c1c';
  ctx.beginPath(); ctx.ellipse(mx,my,mw,mh,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#c0475b';                   // tongue/inner
  ctx.beginPath(); ctx.ellipse(mx,my+mh*0.35,mw*0.6,mh*0.5,0,0,Math.PI*2); ctx.fill();
  ctx.lineWidth=Math.max(1,w*0.014); ctx.strokeStyle='rgba(40,15,15,.7)';
  ctx.beginPath(); ctx.ellipse(mx,my,mw,mh,0,0,Math.PI*2); ctx.stroke();
}

function drawPowerups(){
  for(const pu of powerups){
    const pulse = 1 + 0.10*Math.sin(clock*8 + pu.spin*4);
    const g=ctx.createRadialGradient(pu.x,pu.y,0,pu.x,pu.y,pu.r*2.4);
    g.addColorStop(0, pu.t.col+'cc'); g.addColorStop(0.45, pu.t.col+'55'); g.addColorStop(1, pu.t.col+'00');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(pu.x,pu.y,pu.r*2.4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=pu.t.col; ctx.beginPath(); ctx.arc(pu.x,pu.y,pu.r*pulse,0,Math.PI*2); ctx.fill();
    ctx.lineWidth=Math.max(2,pu.r*0.12); ctx.strokeStyle='rgba(255,255,255,.85)'; ctx.stroke();
    ctx.font=(pu.r*1.15|0)+'px -apple-system,"Segoe UI Emoji",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(pu.t.emoji, pu.x, pu.y+1);
  }
}
function drawRings(){
  for(const r of rings){
    const p=r.life/r.max, rad=r.r + Math.min(W,H)*0.2*p;
    ctx.globalAlpha=(1-p)*0.8; ctx.lineWidth=(1-p)*4+1;
    ctx.strokeStyle='rgba('+r.col+',1)';
    ctx.beginPath(); ctx.arc(r.x,r.y,rad,0,Math.PI*2); ctx.stroke();
  }
  ctx.globalAlpha=1;
}
function drawPops(){
  ctx.textAlign='center'; ctx.textBaseline='middle';
  for(const q of pops){
    const a=1-q.life/q.max, sc=1+0.6*(1-a);
    ctx.globalAlpha=a;
    ctx.font='900 '+(clampN(Math.min(W,H)*0.05,16,42)*sc|0)+'px -apple-system,BlinkMacSystemFont,sans-serif';
    ctx.lineWidth=4; ctx.strokeStyle='rgba(0,0,0,.35)'; ctx.strokeText(q.txt,q.x,q.y);
    ctx.fillStyle=q.col; ctx.fillText(q.txt,q.x,q.y);
  }
  ctx.globalAlpha=1;
}
function drawVignette(){
  const g=ctx.createRadialGradient(W/2,H*0.5,Math.min(W,H)*0.34,W/2,H*0.5,Math.max(W,H)*0.78);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(6,2,16,.45)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}
// glowing protective aura + pips when the sausage is shielded
function drawShield(p, count){
  if(count===undefined) count = shields;
  const a = 0.4 + 0.28*Math.sin(clock*6);
  ctx.save();
  ctx.strokeStyle='rgba(125,227,255,'+a+')'; ctx.lineWidth=Math.max(2.5, p.h*0.22);
  ctx.shadowColor='rgba(125,227,255,.85)'; ctx.shadowBlur=16;
  ctx.beginPath(); ctx.ellipse(p.x, p.y, p.w*0.72, p.h*1.7, 0, 0, Math.PI*2); ctx.stroke();
  ctx.restore();
  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font=Math.max(14, p.h*1.0)+'px "Segoe UI Emoji",-apple-system,sans-serif';
  ctx.fillText('🛡️'.repeat(count), p.x, p.y - p.h*2.0);
  ctx.restore();
}

// ---- big faint score painted across the sky ----
function drawSkyScore(){
  if(state!=='play' && state!=='over') return;
  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='900 '+(clampN(Math.min(W,H)*0.30, 80, 340)|0)+'px -apple-system,BlinkMacSystemFont,sans-serif';
  // dark grey on the bright day sky so it stays visible; soft light tint on the dark night sky
  ctx.fillStyle = dayMode ? 'rgba(35,40,55,0.22)' : 'rgba(255,240,255,0.14)';
  ctx.fillText(score, W/2, H*0.24);
  ctx.restore();
}

// ---- little digital birds that fly past and occasionally poop ----
function updateAmbient(dt){
  if(clock > nextBird){
    nextBird = clock + 5 + Math.random()*9;
    const dir = Math.random()<0.5 ? 1 : -1;
    flyBirds.push({ x: dir>0 ? -40 : W+40, y: H*(0.07+Math.random()*0.27),
      vx: dir*(W*0.10 + Math.random()*W*0.07), dir,
      s: clampN(Math.min(W,H)*0.012, 3, 7), wing:0, pooped:false, pooAt:0.25+Math.random()*0.45 });
  }
  for(let i=flyBirds.length-1;i>=0;i--){
    const b=flyBirds[i];
    b.x += b.vx*dt;
    b.wing = Math.sin(clock*16) > 0 ? 1 : 0;
    const prog = b.dir>0 ? b.x/W : (W-b.x)/W;
    if(!b.pooped && prog>b.pooAt){ b.pooped=true; poos.push({x:b.x, y:b.y+b.s, vx:b.vx*0.15, vy:0}); }
    if(b.x < -60 || b.x > W+60) flyBirds.splice(i,1);
  }
  for(let i=poos.length-1;i>=0;i--){
    const p=poos[i]; p.vy += H*1.2*dt; p.x += p.vx*dt; p.y += p.vy*dt;
    if(p.y > H*0.9){ splats.push({x:p.x, y:H*0.9, life:0}); poos.splice(i,1); }
  }
  for(let i=splats.length-1;i>=0;i--){ splats[i].life+=dt; if(splats[i].life>1.8) splats.splice(i,1); }
}
function drawBird(b){
  const s=b.s, d=b.dir;
  const cells = b.wing ? [[-2,-1],[-1,0],[0,0],[1,0],[2,-1],[2.6,-0.2]]
                       : [[-2,1],[-1,0],[0,0],[1,0],[2,1],[2.6,-0.2]];
  ctx.fillStyle='#160a30';
  for(const [cx,cy] of cells) ctx.fillRect(b.x+cx*s*d - s/2, b.y+cy*s - s/2, s+0.7, s+0.7);
  ctx.fillStyle='rgba(120,230,255,.55)';        // tiny digital glint
  ctx.fillRect(b.x+2.6*s*d - s/2, b.y-0.2*s - s/2, s*0.6, s*0.6);
}
function drawBirds(){
  for(const b of flyBirds) drawBird(b);
  ctx.fillStyle='rgba(255,255,255,.92)';         // falling poo
  for(const p of poos){ ctx.beginPath(); ctx.ellipse(p.x, p.y, Math.max(2,W*0.006), Math.max(3,W*0.009), 0,0,Math.PI*2); ctx.fill(); }
  for(const sp of splats){                        // splat on the ground
    const a=1-sp.life/1.8; ctx.globalAlpha=a*0.85; ctx.fillStyle='rgba(240,240,225,1)';
    ctx.beginPath(); ctx.ellipse(sp.x, sp.y, W*0.022, W*0.008, 0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sp.x-W*0.013, sp.y-2, W*0.004,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sp.x+W*0.015, sp.y+1, W*0.005,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
}

function render(){
  drawBackground();
  drawSkyScore();
  drawBirds();
  if(state==='play' || state==='over'){
    ctx.save();
    if(shake>0.1) ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);
    if(player) drawSausage(player);
    if(player && shields>0) drawShield(player);
    drawDrips();
    for(const b of balls) drawBall(b);
    drawPowerups();
    drawRings();
    drawPops();
    ctx.restore();
  }
  if(state==='mp-play') mpRender();
  drawVignette();
}

let last=performance.now();
function loop(now){
  const dt = Math.min(0.033, (now-last)/1000);
  last=now;
  clock += dt;
  updateAmbient(dt);
  update(dt);
  mpUpdate(dt);
  render();
  updateFireworks(dt);
  drawFireworks();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ================= 2-PLAYER MULTIPLAYER MODULE ================= */

function mpAvailable(){ return typeof Peer !== 'undefined'; }
function topMargin(){ return bottomMargin(); }   // mirror of solo's bottom gap, same size
function mpPaddleBottomY(){ return H - bottomMargin() - paddleH()/2; }
function mpPaddleTopY(){ return topMargin() + paddleH()/2; }

function mpMakePaddle(y){ return { x:W/2, y, w:paddleW(), h:paddleH(), tx:W/2, wobStart:-10 }; }

function mpResetMatch(){
  mpBalls = [];
  mpScoreTop = 0; mpScoreBottom = 0;
  mpShieldsTop = 0; mpShieldsBottom = 0;
  mpGrowTop = 0; mpGrowBottom = 0;
  mpHeat = 0; mpWaitingServe = false;
  powerups = []; bits = []; rings = []; pops = []; drips = [];
  mpPBottom = mpMakePaddle(mpPaddleBottomY());
  mpPTop    = mpMakePaddle(mpPaddleTopY());
  mpMyTx = W/2;
  mpNextPU = clock + 5 + Math.random()*4;
  if(mpIsHost()) mpServe();
}
function mpServe(){
  const hi = Math.floor(Math.random()*3);
  const dir = Math.random()<0.5 ? 1 : -1;    // which side it heads toward first
  mpBalls = [ makeBall(W/2, H/2, (Math.random()*2-1)*Math.min(W,H)*0.4, dir*Math.min(W,H)*0.65, hi) ];
}

// ---- HUD swap ----
function mpShowHud(){
  scoreLabel.textContent = 'THEM'; bestLabel.textContent = '';
  if(mpYouPill) mpYouPill.style.display = 'block';
}
function mpHideHud(){
  scoreLabel.textContent = 'SCORE'; bestLabel.textContent = 'BEST';
  scoreEl.textContent = score; bestEl.textContent = best;
  if(mpYouPill) mpYouPill.style.display = 'none';
}
function mpUpdateHudScores(){
  const my = mpIsHost() ? mpScoreBottom : mpScoreTop;
  const opp = mpIsHost() ? mpScoreTop : mpScoreBottom;
  scoreEl.textContent = opp;
  if(mpYouScore) mpYouScore.textContent = my;
}

// ---- connection plumbing ----
function mpTeardown(){
  try{ if(mpConn) mpConn.close(); }catch(e){}
  try{ if(mpPeer) mpPeer.destroy(); }catch(e){}
  mpPeer=null; mpConn=null; mpMode='off'; mpRoomCode=''; mpSnapshot=null;
  if(menuBtn) menuBtn.style.display='none';
  mpHideHud();
}
function mpWireConn(onOpen){
  mpConn.on('open', ()=>{ mpErr=''; onOpen && onOpen(); });
  mpConn.on('data', mpHandleData);
  mpConn.on('close', ()=> mpOnDisconnect('Your friend left the game.'));
  mpConn.on('error', ()=> mpOnDisconnect('Connection lost.'));
}
function mpOnDisconnect(msg){
  if(mpMode==='off') return;
  const wasPlaying = state==='mp-play';
  mpTeardown();
  state='menu';
  renderMenu();
  if(wasPlaying) mpToast(msg);
}
function mpToast(msg){
  const t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText='position:fixed;left:50%;bottom:14%;transform:translateX(-50%);'+
    'background:rgba(0,0,0,.75);color:#fff;padding:10px 18px;border-radius:20px;'+
    'font-weight:700;font-size:15px;z-index:50;pointer-events:none;';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2600);
}

function mpCreateGame(){
  if(!mpAvailable()){ mpErr='No internet connection — multiplayer needs one.'; renderMpChoose(); return; }
  mpRoomCode = Array.from({length:4}, ()=> '0123456789ABCDEFGHJKLMNPQRSTUVWXYZ'[(Math.random()*34)|0]).join('');
  state='mp-hosting'; renderMpHosting('connecting');
  try{
    mpPeer = new Peer('spong-'+mpRoomCode, {debug:0});
  }catch(e){ mpErr='Could not start hosting.'; state='mp-choose'; renderMpChoose(); return; }
  mpPeer.on('open', ()=>{ renderMpHosting('waiting'); });
  mpPeer.on('connection', (conn)=>{
    mpConn = conn; mpMode='host';
    mpWireConn(()=>{ mpStartMatch(); });
  });
  mpPeer.on('error', (err)=>{ mpErr = (err && err.type==='unavailable-id') ? 'That code is taken — try again.' : 'Hosting failed.'; state='mp-choose'; renderMpChoose(); });
}
function mpJoinGame(code){
  code = (code||'').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6);
  if(!code){ mpErr='Enter a code.'; renderMpChoose(); return; }
  if(!mpAvailable()){ mpErr='No internet connection — multiplayer needs one.'; renderMpChoose(); return; }
  mpRoomCode = code;
  state='mp-joining'; renderMpJoining();
  try{
    mpPeer = new Peer({debug:0});
  }catch(e){ mpErr='Could not connect.'; state='mp-choose'; renderMpChoose(); return; }
  mpPeer.on('open', ()=>{
    mpConn = mpPeer.connect('spong-'+mpRoomCode, {reliable:true});
    mpMode='guest';
    mpWireConn(()=>{ mpStartMatch(); });
    mpConn.on('error', ()=>{ mpErr="Couldn't find that game — check the code."; mpTeardown(); state='mp-choose'; renderMpChoose(); });
  });
  mpPeer.on('error', ()=>{ mpErr="Couldn't find that game — check the code."; mpTeardown(); state='mp-choose'; renderMpChoose(); });
}
function mpStartMatch(){
  initAudio();
  mpResetMatch();
  state='mp-play';
  overlay.classList.add('hidden');
  if(menuBtn) menuBtn.style.display='flex';
  mpShowHud(); mpUpdateHudScores();
  pop(W/2, H/2, 'GO!', '#ffd166');
  playCheer();
}

// ---- networking messages ----
function mpHandleData(msg){
  if(!msg || !msg.t) return;
  if(mpMode==='host'){
    if(msg.t==='in') mpPTop.tx = clampN(msg.x, mpPTop.w/2, W-mpPTop.w/2);
  } else {                                  // guest receives authoritative state
    if(msg.t==='state'){
      mpSnapshot = msg; mpSnapClock = clock;
      mpScoreTop=msg.scoreTop; mpScoreBottom=msg.scoreBottom;
      mpUpdateHudScores();
    } else if(msg.t==='ev'){
      mpPlayEvent(msg);
    }
  }
}
function mpSend(obj){ try{ if(mpConn && mpConn.open) mpConn.send(obj); }catch(e){} }

// client-side (both host's own juice AND guest's replayed juice) for a discrete event
function mpPlayEvent(msg){
  if(msg.k==='hit'){ playSquish(); spawnBits(msg.x,msg.y,12,'#8bedff'); addShake(6); vibrate(12); }
  else if(msg.k==='wall'){ owThrottled(); addShake(4); spawnBits(msg.x,msg.y,4,'#ffffff'); vibrate(8); }
  else if(msg.k==='miss'){ addShake(14); spawnBits(msg.x,msg.y,16,'#ff6b6b'); vibrate(110); }
  else if(msg.k==='save'){ ring(msg.x,msg.y,'120,235,255'); spawnBits(msg.x,msg.y,14,'#7de3ff'); pop(msg.x,msg.y,'SAVED!','#7de3ff'); playClutch(); vibrate([10,20,10]); }
  else if(msg.k==='pu'){ playPowerup(); pop(msg.x,msg.y,msg.label,msg.col); ring(msg.x,msg.y,'255,255,255'); spawnBits(msg.x,msg.y,20,msg.col); vibrate([8,10,8]); }
}

// ---- HOST authoritative simulation ----
function mpUpdate(dt){
  if(state!=='mp-play' || !mpIsHost()) return;
  if(mpGrowTop>0) mpGrowTop=Math.max(0,mpGrowTop-dt);
  if(mpGrowBottom>0) mpGrowBottom=Math.max(0,mpGrowBottom-dt);

  mpPBottom.tx = mpMyTx;
  mpPBottom.w = paddleW()*(mpGrowBottom>0?1.9:1); mpPBottom.h = paddleH()*(mpGrowBottom>0?1.35:1);
  mpPBottom.x += (mpPBottom.tx - mpPBottom.x) * Math.min(1, dt*20);
  mpPBottom.x = clamp(mpPBottom.x, mpPBottom.w/2, W-mpPBottom.w/2);

  mpPTop.w = paddleW()*(mpGrowTop>0?1.9:1); mpPTop.h = paddleH()*(mpGrowTop>0?1.35:1);
  mpPTop.x += (mpPTop.tx - mpPTop.x) * Math.min(1, dt*20);
  mpPTop.x = clamp(mpPTop.x, mpPTop.w/2, W-mpPTop.w/2);

  const bottomEdge = mpPBottom.y - mpPBottom.h/2;
  const topEdge = mpPTop.y + mpPTop.h/2;

  for(let i=mpBalls.length-1;i>=0;i--){
    const b = mpBalls[i];
    b.x += b.vx*dt; b.y += b.vy*dt;
    const hh=b.r, im=headOf(b), hw = headReady(im) ? hh*(im.width/im.height) : hh;
    b.hw=hw; b.hh=hh;
    b.trail.push({x:b.x,y:b.y}); if(b.trail.length>9) b.trail.shift();

    if(b.x-hw<0){ b.x=hw; b.vx=Math.abs(b.vx); mpEvWall(b); }
    if(b.x+hw>W){ b.x=W-hw; b.vx=-Math.abs(b.vx); mpEvWall(b); }

    const withinBottomX = b.x > mpPBottom.x-mpPBottom.w/2-hw && b.x < mpPBottom.x+mpPBottom.w/2+hw;
    if(withinBottomX && b.vy>0 && b.y+hh>bottomEdge && b.y<mpPBottom.y){
      b.vy=-Math.abs(b.vy);
      const rel=(b.x-mpPBottom.x)/(mpPBottom.w/2);
      b.vx += rel*W*0.5; b.vx=clamp(b.vx,-W*1.3,W*1.3);
      b.vy *= 1.06; b.y = bottomEdge - hh;
      mpPBottom.wobStart = clock;
      mpEvHit(b, mpPBottom);
    }
    const withinTopX = b.x > mpPTop.x-mpPTop.w/2-hw && b.x < mpPTop.x+mpPTop.w/2+hw;
    if(withinTopX && b.vy<0 && b.y-hh<topEdge && b.y>mpPTop.y){
      b.vy=Math.abs(b.vy);
      const rel=(b.x-mpPTop.x)/(mpPTop.w/2);
      b.vx += rel*W*0.5; b.vx=clamp(b.vx,-W*1.3,W*1.3);
      b.vy *= 1.06; b.y = topEdge + hh;
      mpPTop.wobStart = clock;
      mpEvHit(b, mpPTop);
    }

    if(b.y-hh>H){                              // passed bottom
      if(mpShieldsBottom>0){ mpShieldsBottom--; b.y=H-hh; b.vy=-Math.abs(b.vy)*0.9; mpEvSave(b); }
      else { mpScoreTop++; mpEvMiss(b); mpBalls.splice(i,1); }
    } else if(b.y+hh<0){                       // passed top
      if(mpShieldsTop>0){ mpShieldsTop--; b.y=hh; b.vy=Math.abs(b.vy)*0.9; mpEvSave(b); }
      else { mpScoreBottom++; mpEvMiss(b); mpBalls.splice(i,1); }
    }
  }

  if(mpBalls.length===0 && !mpWaitingServe){
    mpWaitingServe = true;
    setTimeout(()=>{ if(mpIsHost() && state==='mp-play'){ mpServe(); } mpWaitingServe=false; }, 900);
  }

  mpUpdatePowerups(dt);
  updateEffects(dt);

  let fastest=0; for(const b of mpBalls){ const sp=Math.hypot(b.vx,b.vy); if(sp>fastest) fastest=sp; }
  const target=speedHeat(fastest);
  mpHeat += (target-mpHeat)*Math.min(1,dt*2.0);
  setSizzle(mpHeat);

  if(Math.random()<dt*2.4){
    spawnDrips(1, mpPBottom.x+(Math.random()*2-1)*mpPBottom.w*0.42, mpPBottom.y+mpPBottom.h*0.5, 4);
    spawnDrips(1, mpPTop.x+(Math.random()*2-1)*mpPTop.w*0.42, mpPTop.y-mpPTop.h*0.5, 4);
  }
  updateDrips(dt);
  mpUpdateHudScores();

  // broadcast state at ~24Hz
  if(clock - mpLastSend > 1/24){
    mpLastSend = clock;
    mpSend({ t:'state',
      balls: mpBalls.map(b=>({x:b.x,y:b.y,vx:b.vx,vy:b.vy,r:b.r,hh:b.hh,hw:b.hw,hi:b.hi})),
      pTop:{x:mpPTop.x,w:mpPTop.w,h:mpPTop.h,wobStart:mpPTop.wobStart},
      pBottom:{x:mpPBottom.x,w:mpPBottom.w,h:mpPBottom.h,wobStart:mpPBottom.wobStart},
      scoreTop:mpScoreTop, scoreBottom:mpScoreBottom,
      shieldsTop:mpShieldsTop, shieldsBottom:mpShieldsBottom,
      heat:mpHeat,
      powerups: powerups.map(pu=>({x:pu.x,y:pu.y,r:pu.r,k:pu.t.k,spin:pu.spin}))
    });
  }
}
function mpEvWall(b){ owThrottled(); addShake(4); spawnBits(b.x,b.y,4,'#ffffff'); vibrate(8); mpSend({t:'ev',k:'wall',x:b.x,y:b.y}); }
function mpEvHit(b, p){ playSquish(); spawnBits(b.x,p.y,12,'#8bedff'); addShake(6); vibrate(12); mpSend({t:'ev',k:'hit',x:b.x,y:p.y}); }
function mpEvMiss(b){ addShake(14); spawnBits(b.x, b.y<H/2?0:H, 16, '#ff6b6b'); vibrate(110); mpSend({t:'ev',k:'miss',x:b.x,y:b.y}); }
function mpEvSave(b){ ring(b.x,b.y,'120,235,255'); spawnBits(b.x,b.y,14,'#7de3ff'); pop(b.x,b.y,'SAVED!','#7de3ff'); playClutch(); vibrate([10,20,10]); mpSend({t:'ev',k:'save',x:b.x,y:b.y}); }

function mpUpdatePowerups(dt){
  if(clock > mpNextPU){
    mpNextPU = clock + 6 + Math.random()*5;
    const t = PU_TYPES[(Math.random()*PU_TYPES.length)|0];
    const r = clampN(Math.min(W,H)*0.045, 16, 40);
    const fromTop = Math.random()<0.5;         // spawn from either edge -> fair for both sides
    const x = r+Math.random()*(W-2*r);
    powerups.push({ x, y: fromTop? -r : H+r, r, vy:(fromTop?1:-1)*Math.min(W,H)*0.26, t, spin:0 });
  }
  const bEdge = mpPBottom.y - mpPBottom.h/2, tEdge = mpPTop.y + mpPTop.h/2;
  for(let i=powerups.length-1;i>=0;i--){
    const pu = powerups[i];
    pu.y += pu.vy*dt; pu.spin += dt;
    const withinBottomX = pu.x>mpPBottom.x-mpPBottom.w/2-pu.r && pu.x<mpPBottom.x+mpPBottom.w/2+pu.r;
    if(withinBottomX && pu.y+pu.r>bEdge && pu.y-pu.r<mpPBottom.y+mpPBottom.h/2){
      mpApplyPowerup(pu.t, pu.x, pu.y, 'bottom'); powerups.splice(i,1); continue;
    }
    const withinTopX = pu.x>mpPTop.x-mpPTop.w/2-pu.r && pu.x<mpPTop.x+mpPTop.w/2+pu.r;
    if(withinTopX && pu.y-pu.r<tEdge && pu.y+pu.r>mpPTop.y-mpPTop.h/2){
      mpApplyPowerup(pu.t, pu.x, pu.y, 'top'); powerups.splice(i,1); continue;
    }
    if(pu.y-pu.r>H+40 || pu.y+pu.r<-40) powerups.splice(i,1);
  }
}
function mpApplyPowerup(t, x, y, side){
  playPowerup(); vibrate([8,10,8]);
  pop(x,y,t.label,t.col); ring(x,y,'255,255,255'); spawnBits(x,y,20,t.col);
  mpSend({t:'ev',k:'pu',x,y,label:t.label,col:t.col});
  if(t.k==='multi'){
    const base = mpBalls[(Math.random()*mpBalls.length)|0];
    const bx=base?base.x:x, by=base?base.y:y;
    const present = new Set(mpBalls.map(b=>b.hi));
    let spawned=0;
    for(let hi=0; hi<3; hi++){ if(!present.has(hi)){ mpBalls.push(spawnHeadBall(bx,by,hi)); spawned++; } }
    if(spawned===0){ for(let k=0;k<2;k++) mpBalls.push(spawnHeadBall(bx,by,(Math.random()*3)|0)); }
  } else if(t.k==='grow'){ if(side==='top') mpGrowTop=5; else mpGrowBottom=5; }
  else if(t.k==='shield'){ if(side==='top') mpShieldsTop=Math.min(mpShieldsTop+1,3); else mpShieldsBottom=Math.min(mpShieldsBottom+1,3); }
}

// ---- input (both roles): own paddle follows local touch/mouse immediately ----
function mpSetLocalTarget(px){
  mpMyTx = px;
  if(mpIsHost()){ /* consumed directly each tick in mpUpdate */ }
  else {
    const now = clock;
    if(now - mpLastSend > 1/28){ mpLastSend = now; mpSend({t:'in', x:px}); }
  }
}

// ---- GUEST render-only local paddle smoothing ----
let mpGuestOwnX = null;
function mpGuestTick(dt){
  if(mpGuestOwnX===null) mpGuestOwnX = mpMyTx;
  mpGuestOwnX += (mpMyTx - mpGuestOwnX) * Math.min(1, dt*20);
}

// ---- rendering ----
function ty(y){ return mpMode==='guest' ? H - y : y; }     // world Y -> local screen Y
function tvy(vy){ return mpMode==='guest' ? -vy : vy; }
function mpRender(){
  mpGuestTick(Math.min(0.033, (performance.now()-(mpRender._last||performance.now()))/1000));
  mpRender._last = performance.now();

  ctx.save();
  if(shake>0.1) ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);

  if(mpIsHost()){
    drawSausage(mpPBottom, mpHeat);
    drawSausage(mpPTop, mpHeat);
    if(mpShieldsBottom>0) drawShield(mpPBottom, mpShieldsBottom);
    if(mpShieldsTop>0) drawShield(mpPTop, mpShieldsTop);
    drawDrips();
    for(const b of mpBalls) drawBall(b, b.vy<0);
    drawPowerups();
  } else {
    // guest: render from latest snapshot, flipped so MY paddle is always at MY bottom
    const snap = mpSnapshot;
    const myPaddle = { x:mpGuestOwnX!=null?mpGuestOwnX:mpMyTx, y:ty(mpPaddleTopY()),
      w:(snap&&snap.pTop?snap.pTop.w:paddleW()), h:(snap&&snap.pTop?snap.pTop.h:paddleH()),
      wobStart:(snap&&snap.pTop?snap.pTop.wobStart:-10) };
    drawSausage(myPaddle, snap?snap.heat:0);
    if(snap && snap.shieldsTop>0) drawShield(myPaddle, snap.shieldsTop);
    if(snap){
      const oppPaddle = { x:snap.pBottom.x, y:ty(mpPaddleBottomY()), w:snap.pBottom.w, h:snap.pBottom.h, wobStart:snap.pBottom.wobStart };
      drawSausage(oppPaddle, snap.heat);
      if(snap.shieldsBottom>0) drawShield(oppPaddle, snap.shieldsBottom);
      drawDrips();
      const dtExtrap = clock - mpSnapClock;
      for(const b of snap.balls){
        const eb = { x:b.x+b.vx*dtExtrap, y: ty(b.y+b.vy*dtExtrap), vx:b.vx, vy:tvy(b.vy), r:b.r, hh:b.hh, hw:b.hw, hi:b.hi, trail:[] };
        drawBall(eb, eb.vy<0);
      }
      for(const pu of snap.powerups){
        const puFull = { x:pu.x, y:ty(pu.y), r:pu.r, spin:pu.spin, t:PU_TYPES.find(x=>x.k===pu.k)||PU_TYPES[0] };
        mpDrawOnePowerup(puFull);
      }
    }
  }
  drawRings(); drawPops();
  ctx.restore();
}
function mpDrawOnePowerup(pu){
  const pulse = 1 + 0.10*Math.sin(clock*8 + pu.spin*4);
  const g=ctx.createRadialGradient(pu.x,pu.y,0,pu.x,pu.y,pu.r*2.4);
  g.addColorStop(0, pu.t.col+'cc'); g.addColorStop(0.45, pu.t.col+'55'); g.addColorStop(1, pu.t.col+'00');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(pu.x,pu.y,pu.r*2.4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=pu.t.col; ctx.beginPath(); ctx.arc(pu.x,pu.y,pu.r*pulse,0,Math.PI*2); ctx.fill();
  ctx.lineWidth=Math.max(2,pu.r*0.12); ctx.strokeStyle='rgba(255,255,255,.85)'; ctx.stroke();
  ctx.font=(pu.r*1.15|0)+'px -apple-system,"Segoe UI Emoji",sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(pu.t.emoji, pu.x, pu.y+1);
}

// ---- menu screens ----
function mpRenderScreen(html, wireFn){
  overlay.innerHTML = html;
  overlay.classList.remove('hidden');
  wireFn && wireFn();
}
function renderMpChoose(){
  state='mp-choose';
  mpRenderScreen(`
    <div class="emoji">🏓</div>
    <h1>PLAY WITH A FRIEND</h1>
    <div class="sub">Create a game and send the link to a friend — you'll play head-to-head, live.</div>
    <button id="mpCreateBtn" class="ui-control">CREATE GAME</button>
    <div class="mp-row">
      <input id="mpCodeInput" class="ui-control mp-input" placeholder="CODE" maxlength="6" autocapitalize="characters" autocomplete="off">
      <button id="mpJoinBtn" class="ui-control ghost">JOIN</button>
    </div>
    <div class="mp-err">${mpErr||''}</div>
    <button id="mpBackBtn" class="ui-control ghost">← BACK</button>
  `, ()=>{
    document.getElementById('mpCreateBtn').addEventListener('click',(e)=>{ e.stopPropagation(); mpErr=''; mpCreateGame(); });
    document.getElementById('mpJoinBtn').addEventListener('click',(e)=>{ e.stopPropagation(); mpErr=''; mpJoinGame(document.getElementById('mpCodeInput').value); });
    document.getElementById('mpCodeInput').addEventListener('keydown',(e)=>{ e.stopPropagation(); if(e.key==='Enter'){ mpErr=''; mpJoinGame(e.target.value); } });
    document.getElementById('mpBackBtn').addEventListener('click',(e)=>{ e.stopPropagation(); mpErr=''; state='menu'; renderMenu(); });
  });
}
function mpShareLink(){ return location.origin + location.pathname + '?room=' + mpRoomCode; }
function renderMpHosting(phase){
  const link = mpShareLink();
  const waiting = phase!=='connecting';
  mpRenderScreen(`
    <div class="emoji">🌭</div>
    <h1>YOUR GAME</h1>
    <div class="mp-code">${mpRoomCode || '····'}</div>
    <div class="mp-link ui-control" id="mpLinkBox">${link}</div>
    <div class="mp-row">
      <button id="mpCopyBtn" class="ui-control ghost">COPY LINK</button>
      ${navigator.share ? '<button id="mpShareBtn" class="ui-control ghost">SHARE</button>' : ''}
    </div>
    <div class="mp-status"><span class="mp-dot ${waiting?'':''}"></span> ${waiting?'Waiting for your friend to join…':'Connecting…'}</div>
    <button id="mpCancelBtn" class="ui-control ghost">CANCEL</button>
  `, ()=>{
    document.getElementById('mpCopyBtn').addEventListener('click', async (e)=>{
      e.stopPropagation();
      try{ await navigator.clipboard.writeText(link); mpToast('Link copied!'); }
      catch(err){ mpToast('Copy failed — long-press the link to copy.'); }
    });
    const shareBtn = document.getElementById('mpShareBtn');
    if(shareBtn) shareBtn.addEventListener('click', (e)=>{
      e.stopPropagation();
      navigator.share({ title:'Sausage Pong', text:'Play Sausage Pong with me!', url:link }).catch(()=>{});
    });
    document.getElementById('mpCancelBtn').addEventListener('click', (e)=>{ e.stopPropagation(); mpTeardown(); state='mp-choose'; renderMpChoose(); });
  });
}
function renderMpJoining(){
  mpRenderScreen(`
    <div class="emoji">🌭</div>
    <h1>JOINING…</h1>
    <div class="mp-code">${mpRoomCode}</div>
    <div class="mp-status"><span class="mp-dot"></span> Connecting to your friend…</div>
    <button id="mpCancelBtn" class="ui-control ghost">CANCEL</button>
  `, ()=>{
    document.getElementById('mpCancelBtn').addEventListener('click', (e)=>{ e.stopPropagation(); mpTeardown(); state='mp-choose'; renderMpChoose(); });
  });
}
function renderMpJoinPrompt(){
  state='mp-choose';
  mpRenderScreen(`
    <div class="emoji">🏓</div>
    <h1>JOIN GAME</h1>
    <div class="sub">Your friend is waiting for you in game <b>${mpUrlRoom}</b>.</div>
    <button id="mpJoinNowBtn" class="ui-control">JOIN ${mpUrlRoom}</button>
    <div class="mp-err">${mpErr||''}</div>
    <button id="mpBackBtn" class="ui-control ghost">PLAY SOLO INSTEAD</button>
  `, ()=>{
    document.getElementById('mpJoinNowBtn').addEventListener('click',(e)=>{ e.stopPropagation(); mpErr=''; mpJoinGame(mpUrlRoom); });
    document.getElementById('mpBackBtn').addEventListener('click',(e)=>{ e.stopPropagation(); mpErr=''; state='menu'; renderMenu(); });
  });
}
